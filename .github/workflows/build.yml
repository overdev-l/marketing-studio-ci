# Marketing Studio Electron 应用 — GitHub Actions 构建 + 发布（Velopack 自动更新）
# 触发方式：overdev-team/marketing-studio 通过 Repository Dispatch API 触发
# 产物：
#   - tag=<version>: .dmg / .zip（首次下载手动安装）
#   - tag=update: releases.osx.json + *.nupkg（Velopack 自动更新清单 + 增量包）

name: Build & Deploy

on:
  repository_dispatch:
    types: [trigger-build]

env:
  TAG: ${{ github.event.client_payload.tag }}
  CHANNEL: ${{ github.event.client_payload.channel }}
  VERSION: ${{ github.event.client_payload.version }}

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: write
    timeout-minutes: 60
    steps:
      - name: Clone source repo
        env:
          MARKETING_STUDIO_REPO_PAT: ${{ secrets.MARKETING_STUDIO_REPO_PAT }}
        run: |
          git config --global credential.helper ''
          git clone --branch "$TAG" \
            "https://x-access-token:${MARKETING_STUDIO_REPO_PAT}@github.com/overdev-team/marketing-studio.git" \
            workspace
          cd workspace
          git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET (for Velopack vpk)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk --version 0.0.1589-ga2c5a97
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          "$HOME/.dotnet/tools/vpk" --help | head -n 5

      - name: Install pnpm
        run: npm install -g pnpm@10.31.0

      - name: Install dependencies
        working-directory: workspace
        run: |
          NODE_ENV=development pnpm install --no-frozen-lockfile --shamefully-hoist 2>&1 | tail -5

      - name: Build renderer
        working-directory: workspace
        run: |
          echo "::group::TypeScript & Vite 构建"
          pnpm run build:renderer
          echo "::endgroup::"

      - name: Build Electron main
        working-directory: workspace
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -eo pipefail
          echo "::group::Electron 主进程"
          pnpm run build:electron
          test -f dist-electron/main.mjs
          echo "::endgroup::"
          echo "::group::原生模块重建（better-sqlite3 锁定 Electron ABI）"
          pnpm run native:rebuild:electron
          echo "::endgroup::"
          echo "::group::裁剪 devDependencies（防 electron-builder 扫描 OOM）"
          pnpm prune --prod 2>&1 | tail -5
          du -sh node_modules || true
          echo "::endgroup::"

      - name: Build .app + .dmg (electron-builder)
        working-directory: workspace
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -eo pipefail
          echo "::group::electron-builder"
          npx electron-builder@26.8.1 --mac --publish never -c.electronVersion=41.0.0
          echo "::endgroup::"
          echo "electron-builder 产物:"
          ls -lh release/*.dmg release/*.zip 2>/dev/null || true

      - name: Pack Velopack release
        working-directory: workspace
        env:
          VELOPACK_PACK_VERSION: ${{ env.VERSION }}
          VELOPACK_CHANNEL: osx
        run: |
          set -eo pipefail
          echo "::group::vpk pack"
          pnpm run release:velopack:mac
          echo "::endgroup::"
          echo "Velopack 产物:"
          ls -lh release/velopack/
          test -f release/velopack/releases.osx.json

      - name: Generate changelog
        working-directory: workspace
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1)
          echo "当前 tag: ${TAG}"
          echo "上一个 tag: ${PREVIOUS_TAG:-'(无)'}"
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$TAG" | grep -E "^- (feat|fix)" || git log --pretty=format:"- %s" -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}" | grep -E "^- (feat|fix)" || git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}")
          fi
          echo "$CHANGELOG" > changelog.txt
          echo "=== Changelog ==="
          cat changelog.txt

      - name: Create GitHub Release (tag=VERSION)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Marketing Studio v${{ env.VERSION }}"
          body_path: workspace/changelog.txt
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            workspace/release/*.dmg
            workspace/release/*.zip

      - name: Update channel release (tag=update) — Velopack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHANNEL_TAG="update"
          REPO="overdev-l/marketing-studio-ci"
          echo "通道: ${CHANNEL_TAG} | 版本: ${VERSION}"

          # 1. 找/创建 update release
          RELEASE_ID=$(curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${CHANNEL_TAG}" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))' 2>/dev/null || true)

          if [ -z "$RELEASE_ID" ]; then
            echo "通道 release 不存在，创建 ${CHANNEL_TAG}"
            RELEASE_ID=$(curl -fsSL -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"tag_name":"update","target_commitish":"main","name":"Marketing Studio update channel","body":"Velopack 自动更新通道（releases.osx.json + nupkg）","prerelease":false}' \
              "https://api.github.com/repos/${REPO}/releases" \
              | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))')
          fi
          if [ -z "$RELEASE_ID" ]; then
            echo "❌ 无法获取/创建 update release"
            exit 1
          fi
          echo "Release ID: ${RELEASE_ID}"

          # 2. 清空 update tag 上所有旧 assets（包括残留的 latest-mac.yml 与上一版 nupkg）
          curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets" \
            | python3 -c 'import sys,json;[print(a["id"]) for a in json.load(sys.stdin)]' \
            | while read -r ASSET_ID; do
                [ -z "$ASSET_ID" ] && continue
                echo "删除旧 asset ${ASSET_ID}"
                curl -fsSL -X DELETE \
                  -H "Authorization: token ${GITHUB_TOKEN}" \
                  "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}" || true
              done

          # 3. 上传 Velopack 整目录到 update release
          cd workspace/release/velopack
          for f in *; do
            [ -f "$f" ] || continue
            CONTENT_TYPE="application/octet-stream"
            case "$f" in
              *.json) CONTENT_TYPE="application/json" ;;
              *.yml|*.yaml) CONTENT_TYPE="text/yaml" ;;
            esac
            echo "上传 ${f} (${CONTENT_TYPE})"
            curl -fsSL -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: ${CONTENT_TYPE}" \
              --data-binary "@${f}" \
              "https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${f}" \
              > /dev/null
          done
          echo "✅ update 通道已切换到 Velopack（v${VERSION}）"

      - name: Feishu notification
        working-directory: workspace
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/2ab8aae4-a857-46f5-8b99-14e3f7ceba80
        run: |
          DMG_FILE=$(basename "$(ls release/*.dmg 2>/dev/null | head -n 1)" 2>/dev/null || echo "Marketing Studio-${VERSION}.dmg")
          export DMG_URL="https://github.com/overdev-l/marketing-studio-ci/releases/download/${TAG}/${DMG_FILE}"
          cat > /tmp/feishu.py <<'PYEOF'
          import json, os
          changelog = open('changelog.txt').read().strip()
          v = os.environ['VERSION']
          ch = os.environ['CHANNEL']
          content = '**版本号：** ' + v + '\n**通道：** ' + ch + '\n\n---\n\n**更新内容：**\n' + changelog
          payload = {
              'msg_type': 'interactive',
              'card': {
                  'header': {'title': {'tag': 'plain_text', 'content': '🚀 Marketing Studio ' + v + ' 已发布'}, 'template': 'blue'},
                  'elements': [
                      {'tag': 'markdown', 'content': content},
                      {'tag': 'action', 'actions': [
                          {'tag': 'button',
                           'text': {'tag': 'plain_text', 'content': '下载 DMG'},
                           'type': 'primary',
                           'url': os.environ['DMG_URL']}
                      ]}
                  ]
              }
          }
          print(json.dumps(payload, ensure_ascii=False))
          PYEOF
          sed -i '' 's/^          //' /tmp/feishu.py 2>/dev/null || sed -i 's/^          //' /tmp/feishu.py
          PAYLOAD=$(python3 /tmp/feishu.py)
          RESP=$(curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD")
          echo "飞书响应: $RESP"
          echo "$RESP" | python3 -c "import sys,json; sys.exit(0 if json.load(sys.stdin).get('code',0)==0 else 1)" \
            && echo "✅ 飞书通知已发送" \
            || { echo "❌ 飞书通知失败"; exit 1; }
