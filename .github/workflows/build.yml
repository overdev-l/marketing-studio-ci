# Marketing Studio Electron 应用 — GitHub Actions 构建 + 发布（Velopack 自动更新）
# 触发方式：overdev-team/marketing-studio 通过 Repository Dispatch API 触发
# 产物：
#   - tag=<version>: marketing-studio-<v>-{arm64,x64}.pkg + 当前版本 Velopack feed assets
#     (Velopack Setup.pkg,装上后即享受自动更新。原 dmg/zip 已废弃,
#      dmg 安装的 .app 没有 Velopack runtime metadata,自动更新无法工作。
#      版本 release 也必须带 releases.osx*.json + nupkg,否则 GitHubSource
#      只扫描最近 10 个 release 时会跳过固定 update tag)
#   - tag=update: GitHub 兼容通道，供旧客户端继续升级
#   - 完成后回调 overdev-team/marketing-studio，由源仓库用自己的 R2 密钥同步更新源
#
# 结构：
#   build (matrix arm64/x64) — 各自 clone/install/electron-builder --dir/vpk pack/upload artifact，并行
#   release (needs: build)   — 下载两份 artifact，把 vpk Setup.pkg 重命名为友好名后发 GH Release、
#                              更新 GitHub update channel、触发源仓库 R2 同步、飞书通知

name: Build & Deploy

on:
  repository_dispatch:
    types: [trigger-build]

env:
  TAG: ${{ github.event.client_payload.tag }}
  CHANNEL: ${{ github.event.client_payload.channel }}
  VERSION: ${{ github.event.client_payload.version }}

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    permissions:
      contents: read
    timeout-minutes: 45
    env:
      ARCH: ${{ matrix.arch }}
      # arm64 沿用 osx channel 不破已装客户端；x64 走 osx-x64
      VELOPACK_CHANNEL: ${{ matrix.arch == 'arm64' && 'osx' || format('osx-{0}', matrix.arch) }}
    steps:
      - name: Clone source repo
        env:
          MARKETING_STUDIO_REPO_PAT: ${{ secrets.MARKETING_STUDIO_REPO_PAT }}
        run: |
          git config --global credential.helper ''
          git clone --branch "$TAG" \
            "https://x-access-token:${MARKETING_STUDIO_REPO_PAT}@github.com/overdev-team/marketing-studio.git" \
            workspace
          cd workspace
          git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Setup .NET (for Velopack vpk)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk --version 0.0.1589-ga2c5a97
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          "$HOME/.dotnet/tools/vpk" --help | head -n 5

      - name: Install pnpm
        run: npm install -g pnpm@11.4.0

      - name: Install dependencies
        working-directory: workspace
        run: |
          NODE_ENV=development pnpm install --no-frozen-lockfile --shamefully-hoist 2>&1 | tail -5

      - name: Build renderer
        working-directory: workspace
        run: |
          echo "::group::TypeScript & Vite 构建"
          pnpm run build:renderer
          echo "::endgroup::"

      - name: Build Electron main
        working-directory: workspace
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -eo pipefail
          echo "::group::Electron 主进程"
          pnpm run build:electron
          test -f dist-electron/main.mjs
          echo "::endgroup::"
          echo "::group::原生模块重建（better-sqlite3 锁定 Electron ABI）"
          pnpm run native:rebuild:electron
          echo "::endgroup::"
          echo "::group::裁剪 devDependencies（防 electron-builder 扫描 OOM）"
          pnpm prune --prod 2>&1 | tail -5
          du -sh node_modules || true
          echo "::endgroup::"

      - name: Build .app (electron-builder --dir, ${{ matrix.arch }})
        working-directory: workspace
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -eo pipefail
          echo "::group::electron-builder ${ARCH}"
          # package.json mac.target=dir,只产出 .app 给 vpk pack 用。
          npx electron-builder@26.8.1 --mac --${ARCH} --publish never -c.electronVersion=41.0.0
          echo "::endgroup::"
          echo "electron-builder .app 产物:"
          ls -lh release/mac release/mac-${ARCH} 2>/dev/null || true

      - name: Pre-fetch previous Velopack full nupkg (${{ matrix.arch }})
        working-directory: workspace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 增量 delta 只需要上一版 full nupkg 在 outputDir，不需要把所有历史包搬一遍。
          REPO="overdev-l/marketing-studio-ci"
          mkdir -p release/velopack-${ARCH}

          ASSETS_JSON=$(curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/update" 2>/dev/null || echo '{"assets":[]}')

          PREVIOUS_FULL=$(echo "$ASSETS_JSON" | ARCH="$ARCH" VERSION="$VERSION" python3 -c "
          import sys, json, os, re
          data = json.load(sys.stdin) if not sys.stdin.isatty() else {'assets': []}
          arch = os.environ['ARCH']
          version = tuple(int(x) for x in os.environ['VERSION'].split('.'))
          candidates = []
          for a in (data.get('assets') or []):
              name = a['name']
              if not name.endswith('-full.nupkg'):
                  continue
              asset_arch = 'x64' if '-osx-x64-' in name else 'arm64'
              if asset_arch != arch:
                  continue
              match = re.search(r'-(\d+\.\d+\.\d+)-osx(?:-x64)?-full\.nupkg$', name)
              if not match:
                  continue
              try:
                  asset_version = tuple(int(x) for x in match.group(1).split('.'))
              except ValueError:
                  continue
              if asset_version < version:
                  candidates.append((asset_version, a['url'], name))
          if candidates:
              _, url, name = sorted(candidates)[-1]
              print(f'{url}\t{name}')
          ")

          if [ -z "$PREVIOUS_FULL" ]; then
            echo "没有可用上一版 full nupkg，跳过 delta prefetch"
          else
            IFS=$'\t' read -r ASSET_API_URL NAME <<< "$PREVIOUS_FULL"
            DEST="release/velopack-${ARCH}/${NAME}"
            echo "下载上一版 full nupkg: ${NAME}"
            curl -fsSL \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              -o "${DEST}" \
              "${ASSET_API_URL}"
          fi
          ls -lh release/velopack-${ARCH}/ 2>/dev/null || true

      - name: Pack Velopack release (${{ matrix.arch }})
        working-directory: workspace
        env:
          VELOPACK_PACK_VERSION: ${{ env.VERSION }}
        run: |
          set -eo pipefail
          echo "::group::vpk pack ${ARCH}"
          node scripts/pack-velopack-release.mjs --arch ${ARCH}
          echo "::endgroup::"
          ls -lh release/velopack-${ARCH}/
          MANIFEST="release/velopack-${ARCH}/releases.${VELOPACK_CHANNEL}.json"
          test -f "$MANIFEST" || { echo "缺少 $MANIFEST"; exit 1; }

          CURRENT_DIR="release/current-${ARCH}"
          rm -rf "$CURRENT_DIR"
          mkdir -p "$CURRENT_DIR"
          cp "release/velopack-${ARCH}/releases.${VELOPACK_CHANNEL}.json" "$CURRENT_DIR/"
          cp "release/velopack-${ARCH}/assets.${VELOPACK_CHANNEL}.json" "$CURRENT_DIR/"
          cp "release/velopack-${ARCH}/RELEASES-${VELOPACK_CHANNEL}" "$CURRENT_DIR/"
          cp "release/velopack-${ARCH}/com.overdev.marketing-studio-${VERSION}-${VELOPACK_CHANNEL}-full.nupkg" "$CURRENT_DIR/"
          cp "release/velopack-${ARCH}/com.overdev.marketing-studio-${VERSION}-${VELOPACK_CHANNEL}-delta.nupkg" "$CURRENT_DIR/"
          cp "release/velopack-${ARCH}/com.overdev.marketing-studio-${VELOPACK_CHANNEL}-Setup.pkg" "$CURRENT_DIR/"
          cp "release/velopack-${ARCH}/com.overdev.marketing-studio-${VELOPACK_CHANNEL}-Portable.zip" "$CURRENT_DIR/"
          echo "当前版本 artifact:"
          ls -lh "$CURRENT_DIR"

      - name: Upload dist artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.arch }}
          # 只上传当前版本产物。上一版 full nupkg 只用于生成 delta，不进入 artifact。
          path: workspace/release/current-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Clone source repo (for changelog)
        env:
          MARKETING_STUDIO_REPO_PAT: ${{ secrets.MARKETING_STUDIO_REPO_PAT }}
        run: |
          git config --global credential.helper ''
          # 需要历史 tag 才能算 PREVIOUS_TAG，不能 --depth 1
          git clone --branch "$TAG" \
            "https://x-access-token:${MARKETING_STUDIO_REPO_PAT}@github.com/overdev-team/marketing-studio.git" \
            workspace
          cd workspace
          git fetch --tags

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          path: workspace/release
          pattern: dist-*
          merge-multiple: true

      - name: Prepare friendly-named .pkg for GH Release
        working-directory: workspace
        run: |
          set -euo pipefail
          # vpk pack 默认产 com.overdev.marketing-studio-osx{,-x64}-Setup.pkg,
          # 文件名里有 packId 不够友好。复制重命名后再传到 tag=<version>。
          cp release/com.overdev.marketing-studio-osx-Setup.pkg \
             release/marketing-studio-${VERSION}-arm64.pkg
          cp release/com.overdev.marketing-studio-osx-x64-Setup.pkg \
             release/marketing-studio-${VERSION}-x64.pkg
          echo "=== 友好命名 .pkg ==="
          ls -lh release/marketing-studio-${VERSION}-*.pkg

      - name: Inventory
        working-directory: workspace
        run: |
          echo "=== release/ 全部 (matrix 合并后,扁平) ==="
          ls -lh release/ 2>/dev/null || true

      - name: Verify version release Velopack assets
        working-directory: workspace
        run: |
          set -euo pipefail
          required=(
            "release/releases.osx.json"
            "release/releases.osx-x64.json"
            "release/assets.osx.json"
            "release/assets.osx-x64.json"
            "release/RELEASES-osx"
            "release/RELEASES-osx-x64"
            "release/com.overdev.marketing-studio-${VERSION}-osx-full.nupkg"
            "release/com.overdev.marketing-studio-${VERSION}-osx-x64-full.nupkg"
            "release/com.overdev.marketing-studio-${VERSION}-osx-delta.nupkg"
            "release/com.overdev.marketing-studio-${VERSION}-osx-x64-delta.nupkg"
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "缺少版本 release 必需资产: $file"; exit 1; }
          done

      - name: Generate changelog
        working-directory: workspace
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1)
          echo "当前 tag: ${TAG}"
          echo "上一个 tag: ${PREVIOUS_TAG:-'(无)'}"
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$TAG" | grep -E "^- (feat|fix)" || git log --pretty=format:"- %s" -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}" | grep -E "^- (feat|fix)" || git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${TAG}")
          fi
          echo "$CHANGELOG" > changelog.txt
          echo "=== Changelog ==="
          cat changelog.txt

      - name: Create GitHub Release (tag=VERSION)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "Marketing Studio v${{ env.VERSION }}"
          body_path: workspace/changelog.txt
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            workspace/release/marketing-studio-${{ env.VERSION }}-arm64.pkg
            workspace/release/marketing-studio-${{ env.VERSION }}-x64.pkg
            workspace/release/assets.osx*.json
            workspace/release/RELEASES-osx*
            workspace/release/releases.osx*.json
            workspace/release/*.nupkg

      - name: Update channel release (tag=update) — Velopack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHANNEL_TAG="update"
          REPO="overdev-l/marketing-studio-ci"
          echo "通道: ${CHANNEL_TAG} | 版本: ${VERSION}"

          # 1. 找/创建 update release
          RELEASE_ID=$(curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${CHANNEL_TAG}" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))' 2>/dev/null || true)

          if [ -z "$RELEASE_ID" ]; then
            echo "通道 release 不存在，创建 ${CHANNEL_TAG}"
            RELEASE_ID=$(curl -fsSL -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"tag_name":"update","target_commitish":"main","name":"Marketing Studio update channel","body":"Velopack 自动更新通道（osx / osx-x64 channel）","prerelease":false}' \
              "https://api.github.com/repos/${REPO}/releases" \
              | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))')
          fi
          if [ -z "$RELEASE_ID" ]; then
            echo "❌ 无法获取/创建 update release"
            exit 1
          fi
          echo "Release ID: ${RELEASE_ID}"

          # 2. 只上传当前版本 vpk 产物。历史 nupkg 留在 update release 里，不重复下载/上传。
          UPLOAD_FILES=()
          for f in workspace/release/*; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            case "$NAME" in
              marketing-studio-*.pkg) continue ;;
            esac
            UPLOAD_FILES+=("$f")
          done

          if [ "${#UPLOAD_FILES[@]}" -eq 0 ]; then
            echo "❌ 没有可上传的 update assets"
            exit 1
          fi

          printf '上传当前版本 update assets:\n'
          printf '  %s\n' "${UPLOAD_FILES[@]}"
          gh release upload "${CHANNEL_TAG}" "${UPLOAD_FILES[@]}" --repo "${REPO}" --clobber
          echo "✅ update 通道已发布 osx + osx-x64（v${VERSION}）"

      - name: Dispatch R2 sync to source repo
        env:
          MARKETING_STUDIO_REPO_PAT: ${{ secrets.MARKETING_STUDIO_REPO_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${MARKETING_STUDIO_REPO_PAT}" ]; then
            echo "::error::缺失 MARKETING_STUDIO_REPO_PAT"
            exit 1
          fi
          payload=$(python3 - <<'PY'
          import json, os
          print(json.dumps({
              'ref': os.environ['TAG'],
              'inputs': {
                  'version': os.environ['VERSION'],
                  'channel': os.environ['CHANNEL'],
                  'source_repo': 'overdev-l/marketing-studio-ci',
              },
          }))
          PY
          )
          HTTP_STATUS=$(curl -sS -o /tmp/sync-r2-response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${MARKETING_STUDIO_REPO_PAT}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/overdev-team/marketing-studio/actions/workflows/sync-app-updates-r2.yml/dispatches" \
            -d "${payload}")
          if [ "${HTTP_STATUS}" != "204" ]; then
            cat /tmp/sync-r2-response.json
            echo "❌ 触发源仓库 R2 同步失败 (HTTP ${HTTP_STATUS})"
            exit 1
          fi
          echo "✅ 已触发源仓库 R2 同步：${TAG}"

      - name: Feishu notification
        working-directory: workspace
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/2ab8aae4-a857-46f5-8b99-14e3f7ceba80
        run: |
          # 用 Prepare 步骤已经 cp 好的友好命名 .pkg。Setup.pkg 才有 Velopack runtime,
          # 装上后 app 自动更新链路才会工作;dmg 已废弃。
          PKG_ARM64="marketing-studio-${VERSION}-arm64.pkg"
          PKG_X64="marketing-studio-${VERSION}-x64.pkg"
          REL_BASE="https://github.com/overdev-l/marketing-studio-ci/releases/download/${TAG}"
          export PKG_URL_ARM64="${REL_BASE}/${PKG_ARM64}"
          export PKG_URL_X64="${REL_BASE}/${PKG_X64}"
          # Windows 暂未构建。CI 一旦加 windows job,只需在此 export WIN_URL=... 即可让按钮自动出现。
          export WIN_URL=""
          cat > /tmp/feishu.py <<'PYEOF'
          import json, os
          changelog = open('changelog.txt').read().strip()
          v = os.environ['VERSION']
          ch = os.environ['CHANNEL']
          content = '**版本号：** ' + v + '\n**通道：** ' + ch + '\n\n---\n\n**更新内容：**\n' + changelog
          buttons = [
              {'tag': 'button',
               'text': {'tag': 'plain_text', 'content': 'macOS (Apple Silicon)'},
               'type': 'primary',
               'url': os.environ['PKG_URL_ARM64']},
              {'tag': 'button',
               'text': {'tag': 'plain_text', 'content': 'macOS (Intel)'},
               'type': 'default',
               'url': os.environ['PKG_URL_X64']},
          ]
          win_url = os.environ.get('WIN_URL', '').strip()
          if win_url:
              buttons.append({
                  'tag': 'button',
                  'text': {'tag': 'plain_text', 'content': 'Windows'},
                  'type': 'default',
                  'url': win_url,
              })
          payload = {
              'msg_type': 'interactive',
              'card': {
                  'header': {'title': {'tag': 'plain_text', 'content': '🚀 Marketing Studio ' + v + ' 已发布'}, 'template': 'blue'},
                  'elements': [
                      {'tag': 'markdown', 'content': content},
                      {'tag': 'action', 'actions': buttons},
                  ]
              }
          }
          print(json.dumps(payload, ensure_ascii=False))
          PYEOF
          sed -i 's/^          //' /tmp/feishu.py
          PAYLOAD=$(python3 /tmp/feishu.py)
          RESP=$(curl -s -X POST "$FEISHU_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD")
          echo "飞书响应: $RESP"
          echo "$RESP" | python3 -c "import sys,json; sys.exit(0 if json.load(sys.stdin).get('code',0)==0 else 1)" \
            && echo "✅ 飞书通知已发送" \
            || { echo "❌ 飞书通知失败"; exit 1; }
